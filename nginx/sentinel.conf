upstream sentinel_api {
    least_conn;
    server api:8000 weight=5 max_fails=3 fail_timeout=30s;
    server api-replica:8000 weight=5 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Gzip
    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 1024;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # WebSocket upgrade - Stage 10
    location /api/v1/ws/ {
        proxy_pass http://sentinel_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;     # 24h for long-lived WS connections
        proxy_send_timeout 86400;
        proxy_connect_timeout 60s;
    }

    # API routes
    location /api/ {
        proxy_pass http://sentinel_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        # Rate limiting
        limit_req zone=api_limit burst=50 nodelay;
    }

    # Health/ops
    location /health {
        proxy_pass http://sentinel_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    location /ready {
        proxy_pass http://sentinel_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }
}
